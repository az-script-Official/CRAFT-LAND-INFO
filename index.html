<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحليل خرائط Free Fire - Craft Land</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-decor">
    <div class="b1"></div>
    <div class="b2"></div>
    <div class="b3"></div>
</div>

<div class="container">
    <header class="header">
        <div class="header-inner">
            <div class="header-icon">
                <img src="https://i.ibb.co/trCd87Q/1000031475.jpg" alt="Logo">
            </div>
            <div>
                <h1>Info Craft Land</h1>
                <p>تحليل خرائط ارض الحرف</p>
            </div>
        </div>
    </header>

    <main>
        <div class="search-box">
            <div class="search-row">
                <div class="search-wrap">
                    <input type="text" id="mapInput" placeholder="أدخل كود الخريطة (مثال: 9A75B1)">
                </div>
                <button class="btn-analyze" id="btnAnalyze">
                    <span id="btnText">تحليل البيانات</span>
                </button>
            </div>
        </div>

        <div class="error-box hidden" id="errorBox">
            <div style="flex:1">
                <p class="error-title">فشل الاتصال</p>
                <p class="error-msg" id="errorMsg"></p>
            </div>
        </div>

        <div class="loading hidden" id="loadingBox">
            <div class="big-spinner"></div>
            <p>جاري جلب بيانات الخريطه...</p>
        </div>

        <div id="results" class="hidden">
            <div class="card" id="heroCard">
                <div class="hero-overlay">
                    <img class="hero-img" id="heroImg" src="" alt="Map Cover">
                    <div class="hero-info">
                        <h2 id="heroTitle"></h2>
                        <p id="heroAuthor"></p>
                        <span class="badge badge-orange" id="badgeCode"></span>
                    </div>
                </div>
                <div class="actions" id="actionsBar">
                    <button class="btn-action btn-green" id="downloadImgBtn">تحميل الصورة</button>
                </div>
            </div>

            <div class="stats-grid" id="statsGrid"></div>

            <div class="card">
                <div class="section-header"><h3>معلومات الخريطة</h3></div>
                <div class="section" id="detailsContent"></div>
            </div>

            <div class="card">
                <div class="section-header"><h3>تفاصيل اللعب</h3></div>
                <div class="section" id="gameContent"></div>
            </div>
        </div>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
